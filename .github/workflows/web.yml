name: cadenza-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/cadenza-web/**'
      - 'packages/cadenza-types/**'
      - 'packages/cadenza-session/**'
      - 'packages/cadenza-api/**'
      - 'packages/cadenza-player/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'apps/cadenza-web/**'
      - 'packages/cadenza-types/**'
      - 'packages/cadenza-session/**'
      - 'packages/cadenza-api/**'
      - 'packages/cadenza-player/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/web.yml'

jobs:
  e2e:
    name: playwright (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/cadenza-web
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/cadenza-web
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: apps/cadenza-web
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/cadenza-web/playwright-report/
          retention-days: 14

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/cadenza-web/test-results/
          retention-days: 14
